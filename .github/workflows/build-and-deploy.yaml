name: Run tests and build the Docker image.

on:
  workflow_call:
    inputs:
      gradle_tasks:
        type: string
        description: The Gradle tasks to execute
        required: true
    secrets:
      docker_hub_username:
        required: true
      docker_hub_password:
        required: true

concurrency:
  # Scoped per-workflow and ref. Version collision safety is handled by the caller
  # workflows (main.yaml, pr.yaml) which each have their own concurrency groups.
  group: lan2rf-stats-gateway-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # Docker doesn't support the '+' character in image tags, so we can't quite use true semver, so we use a '-' instead. https://github.com/distribution/distribution/issues/1201
  version_format: ${{ github.event_name == 'pull_request' && format('${{major}}.${{minor}}.${{patch}}-pr.{0}-{1}', github.event.number, github.sha) || '${major}.${minor}.${patch}' }}

jobs:
  #integration-tests:
  #  uses: ./.github/workflows/integration-tests.yaml

  build:
    permissions:
      actions: read
      checks: write
      contents: write
    #needs:
      #- integration-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Checkout history and tags for semantic version calculation

      - name: Determine semantic version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          bump_each_commit: true
          #enable_prerelease_mode: ${{ env.enable_prerelease_mode }}
          version_format: ${{ env.version_format }}

      - name: Output semver debug information
        run: "echo SEMVER debug info: ${{ steps.semver.outputs.debug_output }}"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Login to Docker Hub
        run:  echo ${{ secrets.docker_hub_password }} | docker login --username ${{ secrets.docker_hub_username }} --password-stdin registry.hub.docker.com/library/eddgrant/lan2rf-stats-gateway

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Upload test results artefacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: build/test-results/test

      - name: Publish Unit Test Report
        if: success() || failure()
        uses: dorny/test-reporter@v2
        with:
          name: Unit Test Report
          path: build/test-results/test/*.xml
          reporter: java-junit

      - name: Build with Gradle
        run: ./gradlew --exclude-task test --exclude-task check -Pversion="${{ steps.semver.outputs.version }}" ${{ inputs.gradle_tasks }}

      - name: Push tag to repository
        run: |
          git tag ${{ steps.semver.outputs.version }}
          git push origin ${{ steps.semver.outputs.version }}